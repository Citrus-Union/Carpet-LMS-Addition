carpet:
  category:
    storage: 储存
  rule:
    allayHealInterval:
      name: 悦灵回血间隔
      desc: 控制悦灵的回血间隔（单位：gt）
      extra:
        "0": 设置为0时不回血
    commandCheckStorageData:
      name: 仓库检查数据命令
      desc: 启用 "/checkStorage updateData" 命令
    checkStorageAutoUpdateDataInterval:
      name: 仓库检查数据自动更新间隔
      desc: 设置 checkStorage 自动更新数据的间隔（单位：gt）
      extra:
        "0": 设置为0时不自动更新
    commandCheckStorageServer:
      name: 仓库检查服务命令
      desc: 启用 "/checkStorage serverStatus", "/checkStorage startServer" 和 "/checkStorage stopServer" 命令
    commandLMSOthers:
      name: 管理他人LMS设置
      desc: 查看或修改其他玩家的 /lms 设置
    commandLMSSelf:
      name: 管理自己的LMS设置
      desc: 查看或修改自己的 /lms 设置
    commandSetPassword:
      name: 设置密码命令
      desc: 启用 "/setPassword" 命令
    commandGetItem:
      name: 取物命令
      desc: 启用 "/getItem <item> <count>" 命令
    commandCleanGetItemBot:
      name: 取物假人检查命令
      desc: 启用 "/cleanGetItemBot" 命令
    getItemBotPrefix:
      name: 取物假人前缀
      desc: 设置自动取物假人的命名前缀
      extra:
        "0": 假人名称格式为 <prefix><index>
        "1": 示例：前缀为 "bot_getitem_" 时，名称会是 "bot_getitem_1"、"bot_getitem_2"……
    getItemDelayMs:
      name: 取物容器调用间隔
      desc: 设置 getItem 中每次调用容器取物之间的等待时间（单位：毫秒）
    getItemCooldownSeconds:
      name: 取物玩家限速
      desc: 设置同一玩家名两次 getItem 请求之间的冷却时间（单位：秒，按玩家名匹配，0为关闭）
    getItemMaxCount:
      name: 取物单次最大数量
      desc: 设置 getItem 单次请求允许的最大物品数量（0为不限制）
    getItemMaxBots:
      name: 取物单次假人上限
      desc: 设置 getItem 单次请求最多可召唤的假人数量（0为不限制）
    dispenserBartering:
      name: 发射器猪灵交易
      desc: 发射金物品会触发猪灵交易
      extra:
        "0": 设置为ingot时，金锭会触发交易
        "1": 设置为block时，金锭和金块会触发交易
        "2": 设置为shulkerBox时，有且仅有金锭或金块的潜影盒会触发交易，且潜影盒以物品形式投出
    dispenserBarteringName:
      name: 发射器猪灵交易名称
      desc: 设置触发发射器猪灵交易所需的发射器名称
      extra:
        "0": 如果设置为 false，则禁用该规则
        "1": 设置为 true 时，命名为“bartering”的发射器会触发猪灵交易
        "2": 如果设置为别的字符串，则以该字符串命名的发射器会触发猪灵交易
    elytraRecipe:
      name: 可再生鞘翅
      desc: 添加鞘翅的制作配方
    enchantedGoldenAppleRecipe:
      name: 可再生附魔金苹果
      desc: 添加附魔金苹果的制作配方
    explosionProofBuddingAmethyst:
      name: 防爆紫晶芽
      desc: 将紫晶芽的爆炸抗性设置为与基岩相同
    fragileTrialSpawner:
      name: 脆弱试炼刷怪笼
      desc: 将试炼刷怪笼的爆炸抗性设置为与信标相同
    fragileVault:
      name: 脆弱宝库
      desc: 将宝库的爆炸抗性设置为与信标相同
    globalSlimeChunk:
      name: 全局史莱姆区块
      desc: 将所有区块视为史莱姆区块
    helmetControlsPlayerDistance:
      name: 头盔控制加载距离
      desc: "命名为 #load<数字> 的皮革头盔，会将佩戴者的模拟距离和渲染距离设置为指定的数字"
      extra:
        "0": 有效范围：[1，31]
        "1": 渲染距离被限制在服务器的默认渲染距离内
        "2": 模拟距离被限制在服务器的默认模拟距离内
    lowHealthSpectator:
      name: 低血量自动切换旁观
      desc: 当玩家生命值在受到伤害后低于设定的阈值时，将玩家切换到旁观者模式
    lowHealthSpectatorCooldown:
      name: 低血量切换旁观冷却
      desc: 设置玩家再次切换到旁观模式前的冷却时间
    lowHealthSpectatorMethod:
      name: 低血量切换旁观方式
      desc: 设置低生命时将玩家切换到旁观模式的方法
    lowHealthSpectatorThreshold:
      name: 低血量切换旁观阈值
      desc: 玩家生命值低于此阈值时，将被切换到旁观模式
    minecartChunkLoader:
      name: 动力矿车区块加载
      desc: 动力矿车有燃料时，每 gt 会为所在区块发出一张时长为规则值（单位：gt）的加载票
      extra:
        "0": 设置为 0 时，动力矿车不会加载区块
        "1": 加载票等级与地狱门相同
    opPlayerNoCheatExtra:
      name: 更好的防止op作弊
      desc: 禁用更多命令以防止作弊
      extra:
        "0": 禁用命令列表：
        "1": >-
          /clear
          /damage
          /fillbiome
          /forceload
          /item
          /place
          /spawnpoint
    pearlIgnoreEntityCollision:
      name: 珍珠忽略实体碰撞
      desc: 末影珍珠忽略与实体的碰撞
    pearlNoTp:
      name: 命名珍珠不传送
      desc: 阻止具有特定自定义命名的末影珍珠传送
      extra:
        "0": 如果设置为 false，则禁用该规则
        "1": 设置为 true 时，命名为“noTp”的末影珍珠不会传送玩家
        "2": 如果设置为别的字符串，则以该字符串命名的末影珍珠在撞击时不会传送玩家
    playerCommandDropall:
      name: 玩家丢出全部物品
      desc: 用“dropall”替代“dropstack all”
    shulkerBoxFurnace:
      name: 潜影盒熔炉
      desc: 按模式处理潜影盒烧制
      extra:
        "0": false - 原版逻辑
        "1": force - 盒内可烧制物品在原槽位烧制完成，不可烧制物品保留原槽位，10秒后返回潜影盒
        "2": strict - 仅当盒内非空且全部可烧制时才可烧制，否则该潜影盒不可烧制
    shulkerDupLowHealthFailChance:
      name: 低血量潜影贝复制失败概率
      desc: 设置潜影贝生命值低于一半时复制失败的概率
      extra:
        "0": 失败概率 = 1 / value
        "1": 设置为0时不会失败
    shulkerDupNearbyLimit:
      name: 潜影贝复制附近数量限制
      desc: 设置根据附近数量减少潜影贝复制几率的除数
      extra:
        "0": 失败概率 = （附近潜影贝数量包括自身 - 1） / value
    softTrialSpawner:
      name: 易碎试炼刷怪笼
      desc: 将试炼刷怪笼的硬度设置为与信标相同
    softVault:
      name: 易碎宝库
      desc: 将宝库的硬度设置为与信标相同
    spongeRecipe:
      name: 可再生海绵
      desc: 添加海绵的制作配方
    unbreakableBuddingAmethyst:
      name: 不可破坏紫水晶母岩
      desc: 将紫水晶母岩的硬度设置为与基岩相同
    vaultMaxBlacklistSize:
      name: 宝库黑名单上限
      desc: 设置宝库黑名单中存储的最大玩家数量
    zombifiedPiglinSpawnFix:
      name: 僵尸猪灵生成修复
      desc: 当僵尸猪人在地狱门上受随机刻而生成时，将会检测他的碰撞箱来判断是否可以生成
