carpetlmsaddition:
  message:
    cleanGetItemBot:
      botsWithItem: "有物品的假人共 %d 个"
      cleaned: "假人已清理：%s"
      started: 已开始清理取物假人的物品
      tutor:
        "0": 使用 /cleanGetItemBot view
        "1": "查看有物品的取物假人数量\n"
        "2": 使用 /cleanGetItemBot clean <n>
        "3": "自动清理n堆取物假人背包内的物品\n"
        "4": 如 /cleanGetItemBot clean 256
        "5": 自动清理256堆
    common:
      unknownError: 未知错误
      command:
        playerOnly: "%s 只能由玩家执行"
        noPermission: "没有权限执行 %s，可以通过 Carpet 规则 %s 配置权限"
    getItem:
      botResultSeparator: "："
      botResultCountSuffix: " x%d"
      countOutOfRange: "数量必须在 1 到 %d 之间"
      countTooSmall: 数量至少为 1
      donePrefix: 获取物品完成：
      doneCount: " x%d"
      rateLimited: "获取物品请求过快，请等待 %d 秒"
      started: 获取物品已开始执行
      tutor:
        "0": 使用 /getItem <item> <count>
        "1": "从仓储系统中按数量取出指定物品\n"
        "2": 使用 /getItem <item> <count> nbt
        "3": 以 NBT 列表形式返回结果，便于脚本调用
    playerConfig:
      noPermission: 没有权限
      tutor:
        "0": 使用 /lms <player> <config>
        "1": "查看指定玩家的 LMS 配置项当前值\n"
        "2": 使用 /lms <player> <config> <value>
        "3": "修改指定玩家的 LMS 配置项\n"
        "4": 可用配置项会随规则启用状态动态变化
      unknownBlockNotItem: 未知方块：这不是方块物品
      unknownValue: "未知值：%s"
      value: "%s = %s"
      valueNotFound: "未找到该值：%s"
    password:
      passwordEmpty: 密码不能为空
      success: 密码设置成功
      tutor:
        "0": 使用 /setPassword <password>
        "1": 为当前玩家设置网页登录密码
      userDataError: 用户数据错误
      usernameEmpty: 用户名不能为空
    storageWebsite:
      action:
        starting: 仓储网站已启动
        stopping: 仓储网站已停止
      status:
        running: 仓储网站运行中
        stopped: 仓储网站未开启
      tutor:
        "0": 使用 /storageWebsite status
        "1": "查看仓储网站当前运行状态\n"
        "2": 使用 /storageWebsite start 或 /storageWebsite stop
        "3": 启动或停止仓储网站服务

carpet:
  category:
    storage: 储存
  rule:
    allayHealInterval:
      name: 悦灵回血间隔
      desc: 控制悦灵的回血间隔（单位：gt）
      extra:
        "0": 设置为0时不回血
        "1": <0时不修改原版行为
    breakingRestriction:
      name: 玩家破坏限制
      desc: 启用通过 /lms 配置的玩家方块破坏限制
    commandStorageWebsite:
      name: 仓库网页命令
      desc: 启用 "/storageWebsite status", "/storageWebsite start" 和 "/storageWebsite stop" 命令
    commandLMSBot:
      name: 管理假人LMS设置
      desc: 查看或修改假人的 /lms 设置
    commandLMSOthers:
      name: 管理他人LMS设置
      desc: 查看或修改其他玩家的 /lms 设置
    commandLMSSelf:
      name: 管理自己的LMS设置
      desc: 查看或修改自己的 /lms 设置
    commandSetPassword:
      name: 设置密码命令
      desc: 启用 "/setPassword" 命令
    commandGetItem:
      name: 取物命令
      desc: 启用 "/getItem <item> <count>" 命令
    commandGetStorageData:
      name: 仓库数据查询命令
      desc: 启用 "/getStorageData" 和 "/getStorageData <id>" 命令
    commandCleanGetItemBot:
      name: 取物假人检查命令
      desc: 启用 "/cleanGetItemBot" 命令
    entityTeleportCrossDimension:
      name: 跨维度传送实体
      desc: 跨维度传送实体动量处理方案
      extra:
        "0": 设为origin时，不进行改变
        "1": 设为1.21.9+时，启用1.21.9pre1+的方案
        "2": 设为1.21.8-时，启用25w37a-的方案
    websiteGetItem:
      name: 网页取物 API
      desc: 启用储存网页的 getItem API
    getItemBotPrefix:
      name: 取物假人前缀
      desc: 设置自动取物假人的命名前缀
      extra:
        "0": 假人名称格式为 <prefix><index>
        "1": 示例：前缀为 "bot_getitem_" 时，名称会是 "bot_getitem_1"、"bot_getitem_2"……
    getItemDelayMs:
      name: 取物容器调用间隔
      desc: 设置 getItem 中每次调用容器取物之间的等待时间（单位：毫秒）
    getItemCooldownSeconds:
      name: 取物限速
      desc: 设置同一玩家名两次 getItem 请求之间的冷却时间（单位：秒，0为关闭）
    getStorageDataCooldownSeconds:
      name: 仓库查询限速
      desc: 设置同一玩家名两次仓库查询之间的冷却时间（单位：秒，0为关闭）
    websiteLoginCooldownSeconds:
      name: 网页登录限速
      desc: 设置同一用户名两次网页登录请求之间的冷却时间（单位：秒，0为关闭）
    getItemMaxCount:
      name: 取物单次最大数量
      desc: 设置 getItem 单次请求允许的最大物品数量（0为不限制）
    getItemMaxBots:
      name: 取物单次假人上限
      desc: 设置 getItem 单次请求最多可召唤的假人数量（0为不限制）
    dispenserBartering:
      name: 发射器猪灵交易
      desc: 发射金物品会触发猪灵交易
      extra:
        "0": 设置为ingot时，金锭会触发交易
        "1": 设置为block时，金锭和金块会触发交易
        "2": 设置为shulkerBox时，有且仅有金锭或金块的潜影盒会触发交易，且潜影盒以物品形式投出
    dispenserBarteringName:
      name: 发射器猪灵交易名称
      desc: 设置触发发射器猪灵交易所需的发射器名称
      extra:
        "0": 如果设置为 false，则禁用该规则
        "1": 设置为 true 时，命名为“bartering”的发射器会触发猪灵交易
        "2": 如果设置为别的字符串，则以该字符串命名的发射器会触发猪灵交易
    elytraRecipe:
      name: 可再生鞘翅
      desc: 添加鞘翅的制作配方
    enchantedGoldenAppleRecipe:
      name: 可再生附魔金苹果
      desc: 添加附魔金苹果的制作配方
    explosionProofBuddingAmethyst:
      name: 防爆紫晶芽
      desc: 将紫晶芽的爆炸抗性设置为与基岩相同
    fragileTrialSpawner:
      name: 脆弱试炼刷怪笼
      desc: 将试炼刷怪笼的爆炸抗性设置为与信标相同
    fragileVault:
      name: 脆弱宝库
      desc: 将宝库的爆炸抗性设置为与信标相同
    globalSlimeChunk:
      name: 全局史莱姆区块
      desc: 将所有区块视为史莱姆区块
    lowHealthSpectator:
      name: 低血量自动切换旁观
      desc: 当玩家生命值在受到伤害后低于设定的阈值时，将玩家切换到旁观者模式
    lowHealthSpectatorCooldown:
      name: 低血量切换旁观冷却
      desc: 设置玩家再次切换到旁观模式前的冷却时间
    lowHealthSpectatorMethod:
      name: 低血量切换旁观方式
      desc: 设置低生命时将玩家切换到旁观模式的方法
    lowHealthSpectatorThreshold:
      name: 低血量切换旁观阈值
      desc: 玩家生命值低于此阈值时，将被切换到旁观模式
    opPlayerNoCheatExtra:
      name: 更好的防止op作弊
      desc: 禁用更多命令以防止作弊
      extra:
        "0": 禁用命令列表：
        "1": >-
          /clear
          /damage
          /fillbiome
          /forceload
          /item
          /place
          /spawnpoint
    pearlIgnoreEntityCollision:
      name: 珍珠忽略实体碰撞
      desc: 末影珍珠忽略与实体的碰撞
    pearlNoTp:
      name: 命名珍珠不传送
      desc: 阻止具有特定自定义命名的末影珍珠传送
      extra:
        "0": 如果设置为 false，则禁用该规则
        "1": 设置为 true 时，命名为“noTp”的末影珍珠不会传送玩家
        "2": 如果设置为别的字符串，则以该字符串命名的末影珍珠在撞击时不会传送玩家
    playerCommandDropall:
      name: 玩家丢出全部物品
      desc: 用“dropall”替代“dropstack all”
    shulkerBoxFurnace:
      name: 潜影盒熔炉
      desc: 按模式处理潜影盒烧制
      extra:
        "0": false - 原版逻辑
        "1": force - 盒内可烧制物品在原槽位烧制完成，不可烧制物品保留原槽位，10秒后返回潜影盒
        "2": strict - 仅当盒内非空且全部可烧制时才可烧制，否则该潜影盒不可烧制
    shulkerDupLowHealthFailChance:
      name: 低血量潜影贝复制失败概率
      desc: 设置潜影贝生命值低于一半时复制失败的概率
      extra:
        "0": 失败概率 = 1 / value
        "1": 设置为0时不会失败
        "2": <0时不修改原版行为
    shulkerDupNearbyLimit:
      name: 潜影贝复制附近数量限制
      desc: 设置根据附近数量减少潜影贝复制几率的除数
      extra:
        "0": 失败概率 = （附近潜影贝数量包括自身 - 1） / value
        "1": <0时不修改原版行为
    softTrialSpawner:
      name: 易碎试炼刷怪笼
      desc: 将试炼刷怪笼的硬度设置为与信标相同
    softVault:
      name: 易碎宝库
      desc: 将宝库的硬度设置为与信标相同
    spongeRecipe:
      name: 可再生海绵
      desc: 添加海绵的制作配方
    unbreakableBuddingAmethyst:
      name: 不可破坏紫水晶母岩
      desc: 将紫水晶母岩的硬度设置为与基岩相同
    vaultMaxBlacklistSize:
      name: 宝库黑名单上限
      desc: 设置宝库黑名单中存储的最大玩家数量
      extra:
        "0": <0时不修改原版行为
    zombifiedPiglinSpawnFix:
      name: 僵尸猪灵生成修复
      desc: 当僵尸猪人在地狱门上受随机刻而生成时，将会检测他的碰撞箱来判断是否可以生成
