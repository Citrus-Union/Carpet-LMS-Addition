    spectatorPlayerCannotDropItem:
      "0": Spectator players cannot drop items through player commands
      "1": This can be changed with the Carpet rule spectatorPlayerCannotDropItem

carpet:
  rule:
    allayHealInterval:
      desc: "Control the interval of allay healing (unit: gt)"
      extra:
        "0": 0 represents no healing
        "1": <0 keeps vanilla behavior
    breakingRestriction:
      desc: Enable per-player block breaking restriction configured by /lms
    commandStorageWebsite:
      desc: Enable "/storageWebsite status", "/storageWebsite start" and "/storageWebsite stop" command
    commandLMSBot:
      desc: View or modify bot's /lms settings
    commandLMSOthers:
      desc: View or modify other players' /lms settings
    commandLMSSelf:
      desc: View or modify your own /lms settings
    commandSetPassword:
      desc: Enable "/setPassword" command
    commandGetItem:
      desc: Enable "/getItem <item> <count>" command
    commandGetStorageData:
      desc: Enable "/getStorageData" and "/getStorageData <id>" command
    commandCleanGetItemBot:
      desc: Enable "/cleanGetItemBot" command
    entityTeleportCrossDimension:
      desc: Set how entity motion is handled during cross-dimension teleportation
      extra:
        "0": When set to origin, keeps vanilla behavior
        "1": When set to 1.21.9+, uses the 1.21.9-pre1+ behavior
        "2": When set to 1.21.8-, uses the 25w37a-and-earlier behavior
    websiteGetItem:
      desc: Enable getItem API for storage website
    getItemBotPrefix:
      desc: Set the naming prefix for auto item-fetch bots
      extra:
        "0": Bot name format is <prefix><index>
        "1": 'Example: if prefix is "bot_getitem_", names are "bot_getitem_1", "bot_getitem_2", ...'
    getItemDelayMs:
      desc: Set the wait time between each container-fetch call in getItem (milliseconds)
    getItemCooldownSeconds:
      desc: Set per-player cooldown between getItem requests (seconds, 0 = disabled)
    getStorageDataCooldownSeconds:
      desc: Set per-player cooldown between storage data queries (seconds, 0 = disabled)
    websiteLoginCooldownSeconds:
      desc: Set per-username cooldown between website login requests (seconds, 0 = disabled)
    getItemMaxCount:
      desc: Set the maximum item count accepted by getItem in a single request (0 = unlimited)
    getItemMaxBots:
      desc: Set the maximum number of fake players that getItem may summon per request (0 = unlimited)
    dispenserBartering:
      desc: Trigger piglin bartering by dispensing gold items
      extra:
        "0": When set to ingot, dispensing a gold ingot triggers bartering
        "1": When set to block, dispensing a gold ingot or gold block triggers bartering
        "2": >-
          When set to shulkerBox, dispensing a shulker box that contains only gold ingots or
          gold blocks triggers bartering, and the shulker box is dispensed as an item
    dispenserBarteringName:
      desc: Set the dispenser name required to trigger dispenser bartering
      extra:
        "0": If set to false, the rule is disabled
        "1": >-
          When set to true,
          only a dispenser named "bartering" will trigger piglin bartering
        "2": >-
          If set to a different string,
          only a dispenser named that string will trigger piglin bartering
    elytraRecipe:
      desc: Add a crafting recipe to make elytra renewable
    enchantedGoldenAppleRecipe:
      desc: Add a crafting recipe to make enchanted golden apples renewable
    explosionProofBuddingAmethyst:
      desc: Set the blast resistance of budding amethyst to be the same as bedrock
    fragileTrialSpawner:
      desc: Set the blast resistance of trial spawner to be the same as beacon
    fragileVault:
      desc: Set the blast resistance of vault to be the same as beacon
    globalSlimeChunk:
      desc: Treat every chunk as a slime chunk
    lowHealthSpectator:
      desc: >-
        Switches the player to spectator mode
        when their health falls below the configured threshold after taking damage
    lowHealthSpectatorCooldown:
      desc: Sets a cooldown before the player can be switched to spectator mode again
    lowHealthSpectatorMethod:
      desc: Defines the method used to switch the player into spectator mode
    lowHealthSpectatorThreshold:
      desc: The health threshold below which the player will be switched to spectator mode
    opPlayerNoCheatExtra:
      desc: Disable some more command to prevent cheating
      extra:
        "0": "Affects command list:"
        "1": >-
          /clear
          /damage
          /fillbiome
          /forceload
          /item
          /place
          /spawnpoint
    pearlIgnoreEntityCollision:
      desc: Ender pearls ignore collisions with entities
    pearlNoTp:
      desc: Prevent teleportation when an ender pearl with a specific custom name impacts
      extra:
        "0": If set to false, the rule is disabled
        "1": >-
          When set to true,
          an ender pearl named "noTp" will not teleport the player on impact
        "2": >-
          If set to a different string,
          an ender pearl named that string will not teleport the player on impact
    playerCommandDropall:
      desc: Use "dropall" instead of "dropstack all"
    shulkerBoxFurnace:
      desc: Smelt shulker boxes with mode-based behavior
      extra:
        "0": false - Vanilla behavior
        "1": force - Smelt all smeltable items in place, keep non-smeltable items in place, return the box after 10s
        "2": strict - Only works for non-empty boxes where all items are smeltable; otherwise the box cannot be smelted
    shulkerDupLowHealthFailChance:
      desc: Sets the failure chance of shulker duplication when below half health
      extra:
        "0": Failure chance = 1 / value
        "1": 0 disables failure
        "2": <0 keeps vanilla behavior
    shulkerDupNearbyLimit:
      desc: Sets the divisor used to reduce shulker duplication chance based on nearby count
      extra:
        "0": Failure chance = (nearbyShulkersIncludingSelf - 1) / value
        "1": <0 keeps vanilla behavior
    softTrialSpawner:
      desc: Set the hardness of trial spawner to be the same as beacon
    softVault:
      desc: Set the hardness of vault to be the same as beacon
    spongeRecipe:
      desc: Add a crafting recipe to make sponges renewable
    spectatorPlayerCannotDropItem:
      desc: Prevent spectator players from dropping items through "/player ... drop" and "/player ... dropStack" commands
      extra:
        "0": If the playerCommandDropall rule is enabled, this also applies to the "/player ... dropall" command
    unbreakableBuddingAmethyst:
      desc: Set the hardness of budding amethyst to be the same as bedrock
    vaultMaxBlacklistSize:
      desc: Set the maximum number of players stored in the vault's blacklist
      extra:
        "0": <0 keeps vanilla behavior
    zombifiedPiglinSpawnFix:
      desc: >-
        When spawning zombified piglins in nether gates during random ticks,
        game will check for its hitbox
